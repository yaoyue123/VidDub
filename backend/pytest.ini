[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    integration: marks integration tests (deselect with '-m "not integration"')
    e2e: marks end-to-end tests requiring network/API key
    slow: marks slow tests
    requires_siliconflow: marks tests that require a live SiliconFlow API key
    requires_playwright: marks tests that need a working Playwright browser install
    requires_network: marks tests that need live network access
